<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Attendance" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Apple Splash Screens -->
    <!-- iPhone 15 Pro Max / 14 Pro Max -->
    <link rel="apple-touch-startup-image" href="/splash/splash-1290x2796.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" />
    <!-- iPhone 15 Pro / 14 Pro -->
    <link rel="apple-touch-startup-image" href="/splash/splash-1179x2556.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" />
    <!-- iPhone 14 / 13 / 12 -->
    <link rel="apple-touch-startup-image" href="/splash/splash-1170x2532.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
    <!-- iPhone SE 3rd / 8 / 7 / 6s -->
    <link rel="apple-touch-startup-image" href="/splash/splash-750x1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" />
    <!-- iPad Pro 12.9" -->
    <link rel="apple-touch-startup-image" href="/splash/splash-2048x2732.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)" />
    <!-- iPad 10.2" -->
    <link rel="apple-touch-startup-image" href="/splash/splash-1620x2160.png" media="(device-width: 810px) and (device-height: 1080px) and (-webkit-device-pixel-ratio: 2)" />

    <title>Attendance App</title>

    <!-- Inline splash screen styles (renders before JS loads) -->
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #6d28d9 100%);
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #splash.hide {
        opacity: 0;
        visibility: hidden;
      }
      #splash-icon {
        width: 120px;
        height: 120px;
        border-radius: 24px;
        overflow: hidden;
        animation: splash-bounce 1.5s ease-in-out infinite;
        box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      }
      #splash-icon img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      #splash-title {
        margin-top: 24px;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 22px;
        font-weight: 800;
        color: white;
        letter-spacing: 1px;
        text-transform: uppercase;
      }
      #splash-sub {
        margin-top: 6px;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 13px;
        font-weight: 600;
        color: rgba(255,255,255,0.85);
        letter-spacing: 0.5px;
      }
      #splash-motto {
        margin-top: 6px;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 11px;
        color: rgba(255,255,255,0.6);
        font-style: italic;
      }
      #splash-spinner {
        margin-top: 40px;
        width: 32px;
        height: 32px;
        border: 3px solid rgba(255,255,255,0.25);
        border-top-color: white;
        border-radius: 50%;
        animation: splash-spin 0.8s linear infinite;
      }
      @keyframes splash-bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Splash screen (visible instantly, hidden when React mounts) -->
    <div id="splash">
      <div id="splash-icon">
        <img src="/icons/icon-512.png" alt="Greenidge International School" />
      </div>
      <div id="splash-title">Greenidge</div>
      <div id="splash-sub">International School</div>
      <div id="splash-motto">Nurturing · Growth · Service</div>
      <div id="splash-spinner"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
